<div class="register-screen-wrapper">
  <!-- Dynamic Header -->
  <header class="app-header">
    <button class="back-btn" routerLink="/dashboard/home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="header-content">
      <h1 class="main-title">Register a Complaint</h1>
      <p class="sub-text">Help us keep our city beautiful</p>
    </div>
  </header>

  <!-- Main Scrollable Area -->
  <div class="form-viewport">
    <div class="complaint-card">
      
      <!-- Issue Category -->
      <div class="field-group">
        <label class="field-label">Issue Category</label>
        <div class="styled-dropdown" (click)="toggleDropdown()">
          <span class="dropdown-placeholder" [class.has-value]="selectedCategory !== 'Select category'">
            {{ selectedCategory }}
          </span>
          <svg class="chevron-icon" [class.flipped]="isDropdownOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
          
          <div class="dropdown-panel" *ngIf="isDropdownOpen">
            <div class="dropdown-option" *ngFor="let cat of categories" (click)="selectCategory(cat); $event.stopPropagation()">
              {{ cat }}
            </div>
          </div>
        </div>
        
        <!-- Custom Category Input (shown when 'Other' is selected) -->
        <div class="custom-category-input" *ngIf="isOtherSelected()">
          <div class="iconic-input">
            <div class="lead-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F05A17" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </div>
            <input 
              type="text" 
              [(ngModel)]="customCategory"
              placeholder="Enter your custom issue category" 
              class="plain-field"
              name="customCategory">
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-label">Complaint Title</label>
        <div class="iconic-input">
          <div class="lead-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F05A17" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </div>
          <input 
            type="text" 
            [(ngModel)]="complaintData.title"
            placeholder="Brief title of the issue" 
            class="plain-field"
            name="title">
        </div>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-label">Description of Issue</label>
        <textarea 
          [(ngModel)]="complaintData.description"
          placeholder="Describe the problem in detail..." 
          class="styled-textarea" 
          rows="4"
          name="description"></textarea>
      </div>

      <!-- Location -->
      <div class="field-group">
        <label class="field-label">Location</label>
        <div class="iconic-input">
          <div class="lead-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#F05A17">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
          </div>
          <input 
            type="text" 
            [(ngModel)]="complaintData.location"
            placeholder="Street address or landmark" 
            class="plain-field"
            name="location">
        </div>

        <div class="interactive-map" (click)="openMap()">
          <img src="assets/google_map_snippet.png" alt="Map Area" class="map-bg">
          <div class="map-indicator">
            <div class="indicator-inner"></div>
            <div class="indicator-wave"></div>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-label">Description of Issue</label>
        <textarea placeholder="Describe the problem in detail..." class="styled-textarea" rows="4"></textarea>
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-label">Description of Issue</label>
        <textarea placeholder="Describe the problem in detail..." class="styled-textarea" rows="4"></textarea>
      </div>

      <!-- Photo Evidence -->
      <div class="field-group">
        <label class="field-label">Upload Photo Evidence</label>
        
        <!-- Show upload zone if no image selected -->
        <div class="upload-dropzone" *ngIf="!imagePreview" (click)="fileInput.click()">
          <input type="file" #fileInput (change)="onFileSelected($event)" style="display: none" accept="image/*">
          <div class="dropzone-content">
            <div class="icon-circle-container">
              <div class="icon-circle-bg">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#F05A17" stroke-width="2.2">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <div class="icon-plus-badge">+</div>
              </div>
            </div>
            <h3 class="upload-title">Click to upload or drag and drop</h3>
            <p class="upload-subtitle">PNG, JPG up to 10MB</p>
          </div>
        </div>
        
        <!-- Show image preview if image selected -->
        <div class="image-preview-container" *ngIf="imagePreview">
          <img [src]="imagePreview" alt="Preview" class="preview-image">
          <div class="preview-overlay">
            <div class="preview-info">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M9 2a1 1 0 0 0-.894.553L7.382 4H4a1 1 0 0 0-1 1v3a1 1 0 0 0 .553.894L5 9.618V13a1 1 0 0 0 .553.894L7 14.618V18a1 1 0 0 0 1 1h3.382l.724 1.447A1 1 0 0 0 13 21h5a1 1 0 0 0 1-1v-3.382l1.447-.724A1 1 0 0 0 21 15v-5a1 1 0 0 0-.553-.894L19 8.382V5a1 1 0 0 0-1-1h-3.382l-.724-1.447A1 1 0 0 0 13 2H9z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <span class="file-name">{{ selectedFile?.name }}</span>
            </div>
            <button class="remove-btn" (click)="removeImage()" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer Actions -->
  <footer class="footer-block">
    <button class="primary-orange-btn" (click)="submitComplaint()" type="button">
      <span>Submit Complaint</span>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
    <p class="disclaimer">
      By submitting, you agree to our Terms of Service. Your location will be shared with the municipal resolution team.
    </p>
  </footer>
</div>
